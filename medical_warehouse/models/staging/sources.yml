version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: telegram_messages
        description: "Raw Telegram messages loaded from the data lake."

models:
  - name: stg_telegram_messages
    description: "Cleaned and standardized Telegram messages."
    columns:
      - name: message_id
        description: "Telegram message ID."
        tests:
          - not_null
      - name: channel_name
        description: "Telegram channel handle."
        tests:
          - not_null
      - name: message_date
        description: "UTC timestamp of the message."
        tests:
          - not_null